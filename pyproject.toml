[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
pythonpath = [".", "src"]
markers = [
    "benchmark: pytest-benchmark micro-benchmarks",
    "slow: integration / live-network tests",
]

[tool.ruff]
line-length = 120
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.black]
line-length = 120
target-version = ["py312"]

[tool.coverage.run]
source = ["src/stock_rtx4060"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/hw_profile.py",
    "*/benchmark.py",
]
relative_files = true

[tool.coverage.report]
show_missing = true
skip_empty = true
fail_under = 75
precision = 0
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if __name__ == .__main__.",
    "raise NotImplementedError",
]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
warn_redundant_casts = true
warn_unused_ignores = true
no_implicit_optional = true
strict_equality = true
ignore_missing_imports = true
files = ["src/stock_rtx4060"]
