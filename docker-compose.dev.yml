services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: stock1901_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./mlartifacts:/mlartifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlruns/mlflow.db
      --default-artifact-root /mlartifacts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: stock1901_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"

  grafana:
    image: grafana/grafana:11.2.0
    container_name: stock1901_grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: stock1901_prefect
    ports:
      - "4200:4200"
    environment:
      PREFECT_UI_URL: http://localhost:4200
      PREFECT_API_URL: http://localhost:4200/api
      PREFECT_SERVER_API_HOST: 0.0.0.0
    volumes:
      - prefect_data:/root/.prefect
    command: prefect server start --host 0.0.0.0

  # Prefect agent / worker — polls the default work pool and executes flows
  # deployed by `prefect deploy`. Mounts the repository so `flows/` is
  # importable at runtime.
  prefect-agent:
    image: prefecthq/prefect:3-latest
    container_name: stock1901_prefect_agent
    depends_on:
      - prefect-server
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
      PYTHONPATH: /opt/stock1901:/opt/stock1901/src
    volumes:
      - ./:/opt/stock1901:ro
    working_dir: /opt/stock1901
    command: >
      bash -lc "prefect work-pool create --type process default-pool || true &&
      prefect worker start --pool default-pool"

volumes:
  prometheus_data:
  grafana_data:
  prefect_data:
