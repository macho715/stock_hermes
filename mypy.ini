[mypy]
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
no_implicit_optional = True
strict_equality = True
ignore_missing_imports = True

[mypy-src.stock_rtx4060.ensemble_model]
strict = True

[mypy-src.stock_rtx4060.feature_engine]
strict = True

[mypy-src.stock_rtx4060.risk_rules]
strict = True

[mypy-src.stock_rtx4060.recommendation_engine]
strict = True

[mypy-src.stock_rtx4060.backtester]
strict = True

[mypy-src.stock_rtx4060.observability.*]
strict = True
