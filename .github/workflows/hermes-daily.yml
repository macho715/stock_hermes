name: Hermes Daily Automation

run-name: Hermes Daily ${{ github.ref_name }} by ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "read_report | full_dry_run"
        required: true
        default: "read_report"
        type: choice
        options:
          - read_report
          - full_dry_run
  schedule:
    # 06:30 Asia/Dubai, expressed as UTC because GitHub cron runs in UTC.
    - cron: "30 2 * * 1-5"

permissions:
  contents: read
  issues: write
  actions: read

concurrency:
  group: hermes-daily-${{ github.ref }}
  cancel-in-progress: false

env:
  HERMES_MODE: ${{ inputs.mode || 'read_report' }}
  PAPER_TRADING_ONLY: "true"
  NEW_CAPITAL_ALLOWED: "false"
  LIVE_ORDER_EXECUTION: "false"
  AUTO_BUY_SELL: "false"
  VITE_DASHBOARD_LAYOUT: "executive"

jobs:
  hermes-daily:
    name: Hermes daily read/report automation
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: hermes-read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Python 3.12
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Hermes guard
        run: python scripts/hermes/guard_safety.py --config .hermes/hermes.config.yaml

      - name: Hermes daily runner
        run: python scripts/hermes/hermes_runner.py --mode "${HERMES_MODE}" --config .hermes/hermes.config.yaml

      - name: Make issue body
        if: always()
        run: >
          python scripts/hermes/make_issue_body.py
          --reports reports/hermes
          --out reports/hermes/hermes-issue.md

      - name: Upload Hermes artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: hermes-daily-${{ github.run_number }}
          path: |
            reports/hermes/**
            .hermes/runbooks/**
          if-no-files-found: warn

      - name: Create GitHub issue on failure
        if: failure()
        run: >
          gh issue create
          --repo "${{ github.repository }}"
          --title "ZERO/AMBER: Hermes daily failed ${{ github.run_number }}"
          --body-file reports/hermes/hermes-issue.md
          --label "hermes,automation,needs-review"
        env:
          GH_TOKEN: ${{ github.token }}
