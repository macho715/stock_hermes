name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Type-check (mypy)
        run: mypy src/stock_rtx4060/observability || true
        continue-on-error: true

      - name: Run tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/src
        run: pytest --cov=stock_rtx4060 --cov-report=xml --cov-report=term-missing --tb=short -rfE -v 2>&1 | tee pytest.log

      - name: Show failures summary on failure
        if: failure()
        run: |
          echo "## Test failures (last 200 lines of pytest output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -n 200 pytest.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-log
          path: pytest.log

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.xml

      - uses: codecov/codecov-action@v5
        if: always()
        with:
          file: coverage.xml
          fail_ci_if_error: false
